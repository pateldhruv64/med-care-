name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-smoke:
    name: Backend smoke checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend module smoke check
        run: |
          node -e "Promise.all([
            import('./routes/authRoutes.js'),
            import('./routes/invoiceRoutes.js'),
            import('./routes/labReportRoutes.js'),
            import('./routes/medicalHistoryRoutes.js'),
            import('./routes/qrShareRoutes.js')
          ]).then(() => {
            console.log('Backend route modules loaded successfully');
          }).catch((error) => {
            console.error(error);
            process.exit(1);
          })"

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
